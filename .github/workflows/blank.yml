name: Test Self Hosted Runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Print current directory
        run: pwd

      - name: Create test.md
        run: |
          echo "# Test File" > test.md
          echo "Generated by GitHub Actions" >> test.md

      - name: List files
        run: ls -la

      - name: Show file content
        run: cat test.md

      - name: Cleanup workspace
        if: always()
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -delete

      - name: Verify cleanup
        if: always()
        run: |
          echo "Workspace after cleanup:"
          ls -la "$GITHUB_WORKSPACE"
