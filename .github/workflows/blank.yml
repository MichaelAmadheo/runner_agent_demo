name: Test Self Hosted Runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Print current directory
        run: pwd

      - name: Create test.md
        run: |
          echo "# Test File" > test.md
          echo "Generated by GitHub Actions" >> test.md

      - name: List files
        run: ls -la

      - name: Show file content
        run: cat test.md
